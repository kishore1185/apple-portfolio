<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon (your logo from public folder) -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />

    <!-- Orbitron Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Page Title -->
    <title>R Kishore | Portfolio</title>

    <!-- SEO -->
    <meta name="description" content="Creative developer specializing in AI, mobile apps, and immersive modern web experiences." />
    <meta name="author" content="R Kishore" />

    <!-- Open Graph (LinkedIn / WhatsApp / Facebook Preview) -->
    <meta property="og:title" content="R Kishore" />
    <meta property="og:description" content="Explore AI apps, mobile projects, and modern web experiences in a next-generation portfolio." />
    <meta property="og:type" content="website" />

    <!-- Custom OG image (replace /preview.jpg later if needed) -->
    <meta property="og:image" content="/preview.jpg" />
    <meta property="og:url" content="https://your-domain.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="R Kishore | Creative Developer" />
    <meta name="twitter:description" content="AI-powered apps, mobile development, and immersive UI — crafted with precision." />
    <meta name="twitter:image" content="/preview.jpg" />
  </head>

  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
